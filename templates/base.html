<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melo{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-top">
        <div class="logo">Melo</div>

        <a href="/" class="nav-item {% if page == 'home' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M13 20v-5h-2v5H5v-8H2L12 3l10 9h-3v8z"/>
            </svg>
            Home
        </a>
        <a href="/search" class="nav-item {% if page == 'search' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            Search
        </a>
        <a href="/library" class="nav-item {% if page == 'library' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/>
            </svg>
            Your Library
        </a>
        <a href="/stats" class="nav-item {% if page == 'stats' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
            </svg>
            Stats
        </a>
    </div>

    <div class="sidebar-divider"></div>

    <div class="mood-section">
        <div class="mood-label">Mood</div>
        <div class="mood-pills">
            <button class="mood-pill" data-mood="chill">Chill</button>
            <button class="mood-pill" data-mood="hype">Hype</button>
            <button class="mood-pill" data-mood="focus">Focus</button>
            <button class="mood-pill" data-mood="sad">Sad</button>
        </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sleep-section">
        <div class="sleep-label">Sleep Timer</div>
        <select class="sleep-select" id="sleepSelect">
            <option value="">Off</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">60 minutes</option>
        </select>
        <div class="sleep-timer-display" id="sleepDisplay"></div>
    </div>
</aside>

<div class="main">
    {% block content %}{% endblock %}
</div>

<footer class="player">
    <div class="player-left">
        <div class="now-art" id="nowArt">♪</div>
        <div>
            <div class="now-title" id="nowTitle">—</div>
            <div class="now-artist" id="nowArtist">Select a song to play</div>
        </div>
        <button class="heart-btn" id="heartBtn" onclick="toggleLike()">♡</button>
    </div>

    <div class="player-center">
        <div class="ctrl-row">
            <button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                </svg>
            </button>
            <button class="ctrl" onclick="prevSong()" title="Previous">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
            <button class="play-ctrl" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl" onclick="nextSong()" title="Next">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
            <button class="ctrl" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                </svg>
            </button>
        </div>
        <div class="progress-row">
            <span class="time" id="timeCurrent">0:00</span>
            <div class="progress" id="progressTrack">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-dot"></div>
                </div>
            </div>
            <span class="time right" id="timeTotal">0:00</span>
        </div>
    </div>

    <div class="player-right">
        <div class="viz" id="viz">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span>
        </div>
        <span class="vol-icon">🔊</span>
        <div class="volume" id="volumeTrack">
            <div class="volume-bar" id="volumeBar"></div>
        </div>
        <span class="mood-badge" id="nowMood"></span>
    </div>
</footer>

<div id="toast"></div>
<audio id="audio" preload="none"></audio>
<script src="/static/js/player.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
